---
- name: Set performance profile creator image based on OCP version
  ansible.builtin.set_fact:
    nrop_ppc_image: >-
      {{ ppc_image_rhel8 if (ocp_version_major ~ '.' ~ ocp_version_minor) is version('4.19', '<') else ppc_image }}

- name: Check if PPC needs to run on both master and worker nodes
  ansible.builtin.set_fact:
    pp_target_pool: "{{ 'master,worker' if is_full_schedulable_cluster | default(false) | bool is true else nrop_target_pool }}"

- name: Create temporary must gather directory
  ansible.builtin.tempfile:
    state: directory
    suffix: _must_gather
  register: tmp_must_gather_dir

- name: Collect Must Gather
  ansible.builtin.shell: |
    oc --kubeconfig {{ kubeconfig }} adm must-gather --dest-dir="{{ tmp_must_gather_dir.path }}"
  register: must_gather
  no_log: true
  changed_when: must_gather.rc == 0

- name: Save pull secret
  ansible.builtin.copy:
    content: "{{ pull_secret_string | b64decode }}"
    dest: "{{ tmp_must_gather_dir.path }}/pull_secret"
    mode: '0660'

- name: Generate Performance Profile {{ pp_target_pool }}
  ansible.builtin.include_tasks: pp_generator.yml
  loop: "{{ pp_target_pool.split(',') }}"
  loop_control:
    loop_var: target

- name: Delete temporary must gather directory
  ansible.builtin.file:
    path: "{{ tmp_must_gather_dir.path }}"
    state: absent

- name: Wait for MCP restart
  ansible.builtin.include_tasks: wait_for_mcp.yml

- name: Flush handlers
  ansible.builtin.meta: flush_handlers
