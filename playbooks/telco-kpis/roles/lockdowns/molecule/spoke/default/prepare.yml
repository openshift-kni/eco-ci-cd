                "nsname": "openshift-local-storage",
                "channel": "stable",
                "bundle": "registry.redhat.io/openshift4/ose-local-storage-operator-bundle@sha256:dc6ab5b2f0cad048d1ccc58563c7fd8667cb385134c92b4d575b538",
