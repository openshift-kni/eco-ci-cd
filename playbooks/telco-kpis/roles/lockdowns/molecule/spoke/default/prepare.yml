---
# Molecule prepare phase - sets up test fixtures
#
# Creates mock spoke lockdown JSON files (legacy and new format) for parse testing
# Creates mock metadata for generate testing

- name: Prepare test environment
  hosts: all
  gather_facts: true
  tasks:
    - name: Create test output directory
      ansible.builtin.file:
        path: /tmp/molecule-tests
        state: directory
        mode: '0755'

    # Create mock spoke lockdown JSON (legacy format)
