---
# Run OSLAT latency test
# Test: OSLAT (OS-level latency test)
# Purpose: Measure OS latency on isolated CPUs with PerformanceProfile
# Duration: Configurable via duration parameter (default: 10m)

- name: Set OSLAT test variables
  ansible.builtin.set_fact:
    test_name: "oslat"
    test_display_name: "OSLAT"
    test_description: |
      This script runs the OSLAT test to measure OS-level latency on isolated
      CPUs configured with PerformanceProfile. It clones required repositories,
      sets up the test environment, executes the test, and captures results.
    test_default_duration: "{{ telco_kpis_default_duration_oslat }}"
    test_command: "bash scripts/test_oslat.sh oslat={{ duration | default(telco_kpis_default_duration_oslat) }}"
    test_params_display: " (duration={{ duration | default(telco_kpis_default_duration_oslat) }})"
    test_additional_repos:
      - name: oslat
        url: "{{ telco_kpis_oslat_repo | default('https://gitlab.cee.redhat.com/ran/oslat.git') }}"
    test_junit_pattern: "oslat_report.xml"
    ran_integration_repo: "{{ telco_kpis_ran_integration_repo | default('https://gitlab.cee.redhat.com/ran/ran-integration.git') }}"

- name: Execute OSLAT test
  ansible.builtin.import_tasks: run-test.yml
