---
# Prepares a spoke SNO for IBU operations (seed image generation or upgrade testing).
#
# This playbook:
#   1. Retrieves the spoke kubeconfig from ACM on the hub cluster
#   2. Creates and attaches a dedicated container storage disk to the spoke VM
#      (disk is created automatically if not present — idempotent across runs)
#   3. Configures shared container storage mount on the spoke SNO
#
# Prerequisites:
#   - The spoke SNO must be deployed and managed by ACM on the hub cluster
#
# Usage (seed spoke):
#   ansible-playbook playbooks/ran/ibu-prepare-spoke-sno.yml \
#     -i inventories/ocp-deployment/build-inventory.py \
#     --extra-vars 'hub_cluster=kni-qe-108 spoke_cluster=ibu-seed seed_vm_name=master-0.kni-qe-108'
#
# Usage (target spoke):
#   ansible-playbook playbooks/ran/ibu-prepare-spoke-sno.yml \
#     -i inventories/ocp-deployment/build-inventory.py \
#     --extra-vars 'hub_cluster=kni-qe-109 spoke_cluster=ibu-target seed_vm_name=master-0.kni-qe-109'
#
# Parameters:
#   hub_cluster: Hub cluster name (required)
#   spoke_cluster: Spoke cluster name (required)
#   seed_vm_name: VM name on hypervisor (required)

- name: Retrieve spoke kubeconfig from hub cluster
  hosts: bastion
  vars:
    hub_kubeconfig: "/home/telcov10n/project/generated/{{ hub_cluster }}/auth/kubeconfig"
    seed_kubeconfig: "/tmp/{{ spoke_cluster }}-kubeconfig"
  tasks:
    - name: Assert required variables are defined
      ansible.builtin.assert:
        that:
          - hub_cluster is defined
          - spoke_cluster is defined
          - hub_kubeconfig is defined
          - seed_kubeconfig is defined
        fail_msg: >-
          hub_cluster and spoke_cluster must be provided as extra-vars

    - name: Check hub kubeconfig exists
      ansible.builtin.stat:
        path: "{{ hub_kubeconfig }}"
      register: hub_kubeconfig_stat

    - name: Assert hub kubeconfig file exists
      ansible.builtin.assert:
        that:
          - hub_kubeconfig_stat.stat.exists
        fail_msg: >-
          Hub kubeconfig not found at {{ hub_kubeconfig }}.
          Ensure hub cluster is deployed or provide correct hub_kubeconfig path.

    - name: Get spoke cluster admin kubeconfig secret
      kubernetes.core.k8s_info:
        kubeconfig: "{{ hub_kubeconfig }}"
        api_version: v1
        kind: Secret
        namespace: "{{ spoke_cluster }}"
        name: "{{ spoke_cluster }}-admin-kubeconfig"
      register: spoke_kubeconfig_secret

    - name: Extract spoke kubeconfig to specified path
      ansible.builtin.copy:
        content: "{{ spoke_kubeconfig_secret.resources[0].data.kubeconfig | b64decode }}"
        dest: "{{ seed_kubeconfig }}"
        mode: '0600'

- name: Attach container storage disk to seed SNO VM
  hosts: hypervisor
  vars:
    seed_kubeconfig: "/tmp/{{ spoke_cluster }}-kubeconfig"
    libvirtd_disk_path: /var/lib/libvirt/images
    containers_disk_path: "{{ libvirtd_disk_path }}/{{ seed_vm_name }}-containers.qcow2"
  tasks:
    - name: Assert required variables are defined
      ansible.builtin.assert:
        that:
          - seed_vm_name is defined
          - seed_kubeconfig is defined
        fail_msg: >-
          Both seed_vm_name and seed_kubeconfig must be provided
          as extra-vars

    - name: Create containers qcow2 disk if not exists
      ansible.builtin.command: >-
        qemu-img create -f qcow2 {{ containers_disk_path }} 100G
      args:
        creates: "{{ containers_disk_path }}"
      become: true

    - name: Set ownership on containers disk
      ansible.builtin.file:
        path: "{{ containers_disk_path }}"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0644"
      become: true

    - name: Check current VM disk list
      ansible.builtin.command: virsh domblklist {{ seed_vm_name }}
      register: domblklist
      changed_when: false
      become: true

    - name: Attach containers disk if not already attached
      ansible.builtin.command: >-
        virsh attach-disk {{ seed_vm_name }}
        {{ containers_disk_path }}
        vdb
        --driver qemu --subdriver qcow2 --persistent
      when: containers_disk_path not in domblklist.stdout
      changed_when: true
      become: true

- name: Configure storage partitions on spoke SNO
  hosts: bastion
  vars:
    seed_kubeconfig: "/tmp/{{ spoke_cluster }}-kubeconfig"
  tasks:
    - name: Get SNO node name
      kubernetes.core.k8s_info:
        kubeconfig: "{{ seed_kubeconfig }}"
        api_version: v1
        kind: Node
      register: sno_nodes

    - name: Create containers partition and XFS filesystem on vdb if not present
      ansible.builtin.command: >-
        oc --kubeconfig {{ seed_kubeconfig }}
        debug node/{{ sno_nodes.resources[0].metadata.name }} --
        nsenter -a -t 1 -- bash -c
        "if [ ! -e /dev/disk/by-partlabel/containers ]; then
        sgdisk -n 1:0:0 -c 1:containers /dev/vdb &&
        udevadm settle --timeout=30 &&
        mkfs.xfs -f -L containers /dev/vdb1; fi"
      changed_when: true

- name: Apply MachineConfig and wait for update
  hosts: bastion
  vars:
    seed_kubeconfig: "/tmp/{{ spoke_cluster }}-kubeconfig"
  tasks:
    - name: Apply var-lib-containers MachineConfig
      kubernetes.core.k8s:
        kubeconfig: "{{ seed_kubeconfig }}"
        state: present
        definition: "{{ lookup('template', playbook_dir + '/../templates/mc-var-lib-containers.j2') | from_yaml }}"

    - name: Wait for MachineConfigPool to start updating
      kubernetes.core.k8s_info:
        kubeconfig: "{{ seed_kubeconfig }}"
        kind: MachineConfigPool
        name: master
        wait: true
        wait_condition:
          type: Updating
          status: "True"
        wait_timeout: 120

    - name: Wait for MachineConfigPool to finish updating
      kubernetes.core.k8s_info:
        kubeconfig: "{{ seed_kubeconfig }}"
        kind: MachineConfigPool
        name: master
        wait: true
        wait_condition:
          type: Updated
          status: "True"
        wait_timeout: 1200

- name: Fix extensions image for IBU seed generation (MCO workaround)
  hosts: bastion
  gather_facts: true
  vars:
    _pull_secret_path: /tmp/pull-secret.json
    seed_kubeconfig: "/tmp/{{ spoke_cluster }}-kubeconfig"
    _registry: >-
      {{ disconnected_registry_url }}:{{ disconnected_registry_port }}
  tasks:
    - name: Get release image from spoke ClusterVersion
      kubernetes.core.k8s_info:
        kubeconfig: "{{ seed_kubeconfig }}"
        api_version: config.openshift.io/v1
        kind: ClusterVersion
        name: version
      register: _cv

    - name: Set release image facts
      ansible.builtin.set_fact:
        _release_version: "{{ _cv.resources[0].status.desired.version }}"
        _release_digest: >-
          {{ _cv.resources[0].status.desired.image
          | regex_search('sha256:[a-f0-9]{64}') }}
        _registry_path: >-
          ocp{{ _cv.resources[0].status.desired.version.split('.')[0] }}/openshift

    - name: Fix extensions image in disconnected registry
      when: _release_version.split('.')[1] | int >= 20
      block:
        - name: Write pull secret to temp file
          ansible.builtin.copy:
            content: "{{ pull_secret_string | b64decode }}"
            dest: "{{ _pull_secret_path }}"
            mode: "0600"
          no_log: true

        - name: Get extensions image sha256
          ansible.builtin.command: >-
            {{ ansible_user_dir }}/.local/bin/oc adm release info
            --image-for=rhel-coreos-extensions
            --insecure=true
            --registry-config={{ _pull_secret_path }}
            {{ _registry }}/{{ _registry_path
            }}/release-images@{{ _release_digest }}
          register: _ext_sha_result
          changed_when: false
          failed_when: false

        - name: Copy extensions to first IDMS mirror path
          when: _ext_sha_result.rc == 0
          vars:
            _digest: >-
              {{ _release_digest | regex_replace('^sha256:', '') }}
            _sha: >-
              {{ _ext_sha_result.stdout
              | regex_search('sha256:[a-f0-9]{64}') }}
            _src: >-
              docker://{{ _registry
              }}/{{ _registry_path
              }}/release:{{ _digest }}-rhel-coreos-extensions
            _dest: "docker://{{ _registry }}/{{ _registry_path }}@{{ _sha }}"
          ansible.builtin.command: >-
            skopeo copy
            --authfile={{ _pull_secret_path }}
            --src-tls-verify=false
            --dest-tls-verify=false
            {{ _src }}
            {{ _dest }}
          register: _ext_copy
          changed_when: "'Copying' in _ext_copy.stdout"
          failed_when: false

      always:
        - name: Remove pull secret temp file
          ansible.builtin.file:
            path: "{{ _pull_secret_path }}"
            state: absent
