---
- name: Derive operator catalog version (major.minor)
  changed_when: false
  ansible.builtin.set_fact:
    catalog_version: "{{ ocp_operator_mirror_version.split('.')[0:2] | join('.') }}"

- name: Override certified catalog version if catalog_version_override is defined
  changed_when: false
  ansible.builtin.set_fact:
    certified_catalog_version: "{{ operator_item.catalog_version_override }}"
  when: operator_item.catalog_version_override is defined
  loop: "{{ ocp_operator_mirror_operators_prod | selectattr('catalog', 'equalto', ocp_operator_mirror_prod_certified_catalog_name) | list }}"
  loop_control:
    loop_var: operator_item

- name: Override production catalog version if catalog_version_override is defined
  changed_when: false
  ansible.builtin.set_fact:
    production_catalog_version: "{{ operator_item.catalog_version_override }}"
  when: operator_item.catalog_version_override is defined
  loop: "{{ ocp_operator_mirror_operators_prod | selectattr('catalog', 'equalto', ocp_operator_mirror_prod_redhat_catalog_name) | list }}"
  loop_control:
    loop_var: operator_item

- name: Override community catalog version if catalog_version_override is defined
  changed_when: false
  ansible.builtin.set_fact:
    community_catalog_version: "{{ operator_item.catalog_version_override }}"
  when: operator_item.catalog_version_override is defined
  loop: "{{ ocp_operator_mirror_operators_prod | selectattr('catalog', 'equalto', ocp_operator_mirror_prod_redhat_community_catalog_name) | list }}"
  loop_control:
    loop_var: operator_item

- name: Extract lockdown FBC digests from operators (spoke lockdown validation mode)
  when: (telco_kpis_lockdown_feature_enabled | default(false) | bool)
  block:
    - name: Extract lockdown FBC digest for redhat-operators catalog
      changed_when: false
      ansible.builtin.set_fact:
        redhat_lockdown_fbc: >-
          {{
            (ocp_operator_mirror_operators_prod
            | selectattr('catalog', 'equalto', ocp_operator_mirror_prod_redhat_catalog_name)
            | selectattr('fbc', 'defined')
            | map(attribute='fbc')
            | first | default(''))
          }}

    - name: Extract lockdown FBC digest for certified-operators catalog
      changed_when: false
      ansible.builtin.set_fact:
        certified_lockdown_fbc: >-
          {{
            (ocp_operator_mirror_operators_prod
            | selectattr('catalog', 'equalto', ocp_operator_mirror_prod_certified_catalog_name)
            | selectattr('fbc', 'defined')
            | map(attribute='fbc')
            | first | default(''))
          }}

    - name: Extract lockdown FBC digest for community-operators catalog
      changed_when: false
      ansible.builtin.set_fact:
        community_lockdown_fbc: >-
          {{
            (ocp_operator_mirror_operators_prod
            | selectattr('catalog', 'equalto', ocp_operator_mirror_prod_community_catalog_name)
            | selectattr('fbc', 'defined')
            | map(attribute='fbc')
            | first | default(''))
          }}

    - name: Map production catalogs to index images (digest-based lockdown mode)
      changed_when: false
      ansible.builtin.set_fact:
        catalog_index_map:
          redhat-operators: >-
            {{
              redhat_lockdown_fbc
              if (redhat_lockdown_fbc | default('') | length > 0)
              else (ocp_operator_mirror_prod_catalog_image_name ~ ':v' ~ (production_catalog_version | default(catalog_version)))
            }}
          certified-operators: >-
            {{
              certified_lockdown_fbc
              if (certified_lockdown_fbc | default('') | length > 0)
              else ('registry.redhat.io/redhat/certified-operator-index:v' ~ (certified_catalog_version | default(catalog_version)))
            }}
          community-operators: >-
            {{
              community_lockdown_fbc
              if (community_lockdown_fbc | default('') | length > 0)
              else ('registry.redhat.io/redhat/community-operator-index:v' ~ (community_catalog_version | default(catalog_version)))
            }}


- name: Map production catalogs to index images (tag-based mode)
  changed_when: false
  when: not (telco_kpis_lockdown_feature_enabled | default(false) | bool)
  ansible.builtin.set_fact:
    catalog_index_map:
      redhat-operators: "{{ ocp_operator_mirror_prod_catalog_image_name }}:v{{ production_catalog_version | default(catalog_version) }}"
      certified-operators: "registry.redhat.io/redhat/certified-operator-index:v{{ certified_catalog_version | default(catalog_version) }}"
      community-operators: "registry.redhat.io/redhat/community-operator-index:v{{ community_catalog_version | default(catalog_version) }}"

- name: Remove production catalog JSON file
  ansible.builtin.file:
    path: "{{ ocp_operator_mirror_prod_catalog_json_path }}"
    state: absent

- name: Ensure production catalog image is removed
  containers.podman.podman_image:
    name: "{{ ocp_operator_mirror_prod_catalog_image_name }}:v{{ production_catalog_version | default(catalog_version) }}"
    state: absent

- name: Render production catalog index straight to file
  changed_when: true
  ansible.builtin.shell: >-
    podman run --authfile=/tmp/auth.json --rm
    "{{ ocp_operator_mirror_prod_catalog_image_name }}:v{{ production_catalog_version | default(catalog_version) }}"
    render /configs > "{{ ocp_operator_mirror_prod_catalog_json_path }}"

- name: Set default channel for production operators
  ansible.builtin.include_tasks: set_default_channel.yaml
  loop: "{{ ocp_operator_mirror_operators_prod }}"
  loop_control:
    loop_var: operator
  vars:
    mirror_catalog_json_path: "{{ ocp_operator_mirror_prod_catalog_json_path }}"

- name: Build Red Hat packages
  changed_when: false
  loop: "{{ ocp_operator_mirror_operators_prod | selectattr('catalog', 'equalto', ocp_operator_mirror_prod_redhat_catalog_name) | list }}"
  loop_control:
    loop_var: operator_item
  vars:
    channel_name: "{{ operator_item.channel | default(ocp_operator_mirror_prod_default_channel_map[ocp_operator_mirror_prod_redhat_catalog_name]) }}"
    channels_list: >-
      {{
        ([{'name': operator_item.default_channel}] if operator_item.default_channel is defined else []) +
        [{'name': channel_name}]
      }}
    make_pkg: "{{ {'name': operator_item.name, 'channels': channels_list} }}"
  ansible.builtin.set_fact:
    pkgs_redhat: "{{ (pkgs_redhat | default([])) + [make_pkg] }}"

- name: Build certified packages
  changed_when: false
  loop: "{{ ocp_operator_mirror_operators_prod | selectattr('catalog', 'equalto', ocp_operator_mirror_prod_certified_catalog_name) | list }}"
  loop_control:
    loop_var: operator_item
  vars:
    channel_name: "{{ operator_item.channel | default(ocp_operator_mirror_prod_default_channel_map[ocp_operator_mirror_prod_certified_catalog_name]) }}"
    channels_list: >-
      {{
        ([{'name': operator_item.default_channel}] if operator_item.default_channel is defined else []) +
        [{'name': channel_name}]
      }}
    make_pkg: "{{ {'name': operator_item.name, 'channels': channels_list} }}"
  ansible.builtin.set_fact:
    pkgs_cert: "{{ (pkgs_cert | default([])) + [make_pkg] }}"

- name: Build community packages
  changed_when: false
  loop: "{{ ocp_operator_mirror_operators_prod | selectattr('catalog', 'equalto', ocp_operator_mirror_prod_community_catalog_name) | list }}"
  loop_control:
    loop_var: operator_item
  vars:
    channel_name: "{{ operator_item.channel | default(ocp_operator_mirror_prod_default_channel_map[ocp_operator_mirror_prod_community_catalog_name]) }}"
    channels_list: >-
      {{
        ([{'name': operator_item.default_channel}] if operator_item.default_channel is defined else []) +
        [{'name': channel_name}]
      }}
    make_pkg: "{{ {'name': operator_item.name, 'channels': channels_list} }}"
  ansible.builtin.set_fact:
    pkgs_comm: "{{ (pkgs_comm | default([])) + [make_pkg] }}"

- name: Assemble operators for ImageSetConfiguration
  changed_when: false
  ansible.builtin.set_fact:
    mirror_ops: >-
      {{
        ([] if (pkgs_redhat | default([])) | length == 0 else
          [ {'catalog': catalog_index_map[ocp_operator_mirror_prod_redhat_catalog_name], 'packages': pkgs_redhat} ])
        +
        ([] if (pkgs_cert | default([])) | length == 0 else
          [ {'catalog': catalog_index_map[ocp_operator_mirror_prod_certified_catalog_name], 'packages': pkgs_cert} ])
        +
        ([] if (pkgs_comm | default([])) | length == 0 else
          [ {'catalog': catalog_index_map[ocp_operator_mirror_prod_community_catalog_name], 'packages': pkgs_comm} ])
      }}

- name: Build ImageSetConfiguration
  changed_when: false
  when: (mirror_ops | default([])) | length > 0
  ansible.builtin.set_fact:
    image_set_config:
      apiVersion: mirror.openshift.io/v1alpha2
      kind: ImageSetConfiguration
      mirror:
        operators: "{{ mirror_ops }}"

- name: Show ImageSetConfiguration
  when: (mirror_ops | default([])) | length > 0
  ansible.builtin.debug:
    var: image_set_config

- name: Ensure ImageSetConfiguration.yaml does not exist
  ansible.builtin.file:
    path: "{{ ocp_operator_mirror_image_set_configuration_path }}"
    state: absent

- name: Write ImageSetConfiguration.yaml file
  ansible.builtin.copy:
    content: "{{ image_set_config | to_nice_yaml }}"
    dest: "{{ ocp_operator_mirror_image_set_configuration_path }}"
    mode: '0644'

- name: Ensure oc-mirror workspace is empty
  ansible.builtin.file:
    path: "{{ ocp_operator_mirror_workspace_path }}"
    state: absent

- name: Get oc-mirror version
  ansible.builtin.command: oc-mirror version
  register: oc_mirror_version_output
  changed_when: false

- name: Parse oc-mirror version
  ansible.builtin.set_fact:
    oc_mirror_version: "{{ oc_mirror_version_output.stdout | regex_search('([0-9]+\\.[0-9]+)', '\\1') | first }}"

- name: Set signature flag based on oc-mirror version
  ansible.builtin.set_fact:
    oc_mirror_signature_flag: "{{ '--remove-signatures' if (oc_mirror_version is version('4.20', '>')) else '' }}"

- name: Workaround oc-mirror v2 authfile issue
  no_log: true
  ansible.builtin.copy:
    src: "{{ ocp_operator_mirror_pull_secret_path }}"
    remote_src: true
    dest: "$XDG_RUNTIME_DIR/containers/auth.json"
    mode: "0644"

- name: Run oc-mirror to push operators to internal registry # noqa: command-instead-of-shell
  args:
    chdir: /tmp
  register: oc_mirror
  changed_when: true
  retries: 3
  delay: 30
  until: oc_mirror.rc == 0
  ansible.builtin.shell: >-
    env -u REGISTRY_AUTH_FILE oc-mirror
    --authfile "{{ ocp_operator_mirror_pull_secret_path }}"
    -c "{{ ocp_operator_mirror_image_set_configuration_path }}"
    --workspace file:///{{ ocp_operator_mirror_workspace_path }}
    docker://{{ ocp_operator_mirror_registry_url }}/{{ ocp_operator_mirror_folder }}
    --ignore-release-signature {{ oc_mirror_signature_flag }} --v2

- name: Remove authfile workaround oc-mirror v2 authfile issue
  no_log: true
  ansible.builtin.file:
    path: "$XDG_RUNTIME_DIR/containers/auth.json"
    state: absent

- name: Show oc-mirror result
  ansible.builtin.debug:
    var: oc_mirror.stdout

- name: Find CatalogSource (cs*) and ImageDigestMirrorSet (idms*) manifests
  register: mirror_manifests
  ansible.builtin.find:
    paths: "{{ ocp_operator_mirror_workspace_path }}/{{ ocp_operator_mirror_working_dir_path }}"
    patterns:
      - "cs*.yaml"
      - "idms*.yaml"
    file_type: file

- name: Extract manifest paths
  ansible.builtin.set_fact:
    manifest_paths: "{{ mirror_manifests.files | map(attribute='path') | list }}"

- name: Apply CatalogSources manifests
  loop: "{{ manifest_paths }}"
  loop_control:
    loop_var: manifest_item
  kubernetes.core.k8s:
    kubeconfig: "{{ ocp_operator_mirror_kubeconfig }}"
    state: present
    src: "{{ manifest_item }}"
  notify:
    - Cleanup ocp_operator_mirror artifacts

# Re-tag the digest-based catalog image with a static spoke tag so ZTP configs
# can use a predictable image reference (e.g., :v4.22-spoke instead of :sha256-af78a…).
- name: Re-tag catalog index for spoke ZTP (lockdown mode)
  when: telco_kpis_lockdown_feature_enabled | default(false) | bool
  block:
    - name: Read CatalogSource manifests to extract digest-based image refs
      ansible.builtin.slurp:
        src: "{{ cs_file }}"
      loop: "{{ manifest_paths | select('search', 'cs-.*\\.yaml$') | list }}"
      loop_control:
        loop_var: cs_file
      register: _retag_cs_manifests

    - name: Extract catalog images from CatalogSource manifests
      ansible.builtin.set_fact:
        _retag_catalog_images: >-
          {{
            _retag_cs_manifests.results
            | map(attribute='content')
            | map('b64decode')
            | map('from_yaml')
            | selectattr('spec.image', 'defined')
            | map(attribute='spec.image')
            | list
          }}

    - name: Re-tag each catalog index with static spoke tag
      ansible.builtin.include_role:
        name: lockdowns
        tasks_from: spoke/retag-catalog-index.yml
      vars:
        lockdown_retag_source_image: "{{ catalog_image }}"
        lockdown_retag_target_image: >-
          {{ catalog_image | regex_replace(':[^:]+$', '') }}:v{{ production_catalog_version | default(catalog_version) }}-spoke
        lockdown_retag_authfile: "{{ ocp_operator_mirror_pull_secret_path }}"
      loop: "{{ _retag_catalog_images }}"
      loop_control:
        loop_var: catalog_image

- name: Mutate ocp_operator_mirror_operators_prod catalogs in place
  ansible.builtin.set_fact:
    ocp_operator_mirror_operators_prod: >-
      [{% set prod_ver = (production_catalog_version | default(catalog_version)) | replace('.', '-') -%}
      {% set cert_ver = (certified_catalog_version | default(catalog_version)) | replace('.', '-') -%}
      {% set comm_ver = (community_catalog_version | default(catalog_version)) | replace('.', '-') -%}
      {% set map = {
        ocp_operator_mirror_prod_redhat_catalog_name: 'cs-redhat-operator-index-v' ~ prod_ver,
        ocp_operator_mirror_prod_certified_catalog_name: 'cs-certified-operator-index-v' ~ cert_ver,
        ocp_operator_mirror_prod_community_catalog_name: 'cs-community-operator-index-v' ~ comm_ver
      } -%}
      {%- for op in ocp_operator_mirror_operators_prod -%}
      {{ op | combine({'catalog': map.get(op.catalog, op.catalog)}) }}{{ ',' if not loop.last else '' }}
      {%- endfor -%}]

- name: Accumulate lockdown metadata from production catalogs (spoke lockdown generation mode)
  when:
    - ocp_operator_mirror_generate_lockdown | default(false) | bool
    - oc_mirror is defined
    - oc_mirror.stdout is defined
  ansible.builtin.include_role:
    name: lockdowns
    tasks_from: spoke/accumulate-metadata-prod.yml
  vars:
    lockdown_oc_mirror_output: "{{ oc_mirror.stdout }}"
    lockdown_operators_list: "{{ ocp_operator_mirror_operators_prod }}"
    lockdown_catalog_version: "{{ catalog_version }}"
