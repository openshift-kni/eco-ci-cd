---
- name: Get NROP pod information
  kubernetes.core.k8s_info:
    kind: Pod
    label_selectors:
      - app=numaresources-operator
  register: nrop_pods

- name: Set pod and namespace facts
  ansible.builtin.set_fact:
    pod_name: "{{ (nrop_pods.resources | selectattr('metadata.name', 'search', 'numaresources-controller-manager-') | first).metadata.name }}"
    operator_namespace: "{{ (nrop_pods.resources | selectattr('metadata.name', 'search', 'numaresources-controller-manager-') | first).metadata.namespace }}"
  when: nrop_pods.resources | length > 0

- name: Inspect features on deployed operator
  kubernetes.core.k8s_exec:
    namespace: "{{ operator_namespace }}"
    pod: "{{ pod_name }}"
    command: "bin/numaresources-operator --inspect-features"
  register: features_from_manager

- name: Set active features
  ansible.builtin.set_fact:
    active_features: "{{ (features_from_manager.stdout | from_json).active }}"

- name: Save active feature list
  ansible.builtin.copy:
    content: "{{ active_features }}"
    dest: "{{ tmp_workdir }}/active_from_manager.json"
    mode: '0664'

- name: Get latest features list from tests image
  ansible.builtin.shell: |
    podman run {{ nrop_test_image_tag }} cat /usr/local/share/topics.json
  changed_when: latest_list.rc == 0
  register: latest_list

- name: Set latest features
  ansible.builtin.set_fact:
    latest_features: "{{ (latest_list.stdout | from_json).active }}"

- name: Save active features from test image
  ansible.builtin.copy:
    content: "{{ latest_features }}"
    dest: "{{ tmp_workdir }}/latest.json"
    mode: '0664'

- name: Features to skip
  ansible.builtin.set_fact:
    feature_to_skip: "{{ (latest_features | difference(active_features)) | join(' ') }}"

- name: Build the skip list (In latest but not in active, plus known bugs)
  ansible.builtin.set_fact:
    skip_filter: "!(feature: containsAny { {{ feature_to_skip }} })"
  when: feature_to_skip | length > 0

- name: Save Skip skip_filter
  ansible.builtin.copy:
    content: "{{ skip_filter | default('') }}"
    dest: "{{ tmp_workdir }}/skip_filter.json"
    mode: '0664'

- name: Set scope for Non-reboot tests
  ansible.builtin.set_fact:
    topology_manager_scope: "{% if scope == 'reboot' %}pod{% else %}{{ scope }}{% endif %}"

- name: Create tests directory
  ansible.builtin.file:
    state: directory
    path: "{{ nrop_test_dir }}"
    mode: '0776'
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"

- name: Set ginkgo label
  ansible.builtin.set_fact:
    ginkgo_label: "{{ _ginkgo_label }}"
  when:
    - ginkgo_label is undefined or ginkgo_label | length == 0
    - test_env == "prod"

- name: Save test script
  ansible.builtin.template:
    src: nrop_test_script.sh.j2
    dest: "{{ tmp_workdir }}/{{ scope }}_nrop_test_script.sh"
    mode: '0776'
