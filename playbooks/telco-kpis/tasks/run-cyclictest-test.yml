---
# Run Cyclictest latency test
# Test: Cyclictest (Real-time latency measurement)
# Purpose: Measure RT kernel latency on isolated CPUs with PerformanceProfile
# Duration: Configurable via duration parameter (default: 12h)

- name: Ensure test-runner container image exists on bastion
  ansible.builtin.import_tasks: setup-test-runner.yml

- name: Create artifacts directory on bastion
  ansible.builtin.tempfile:
    state: directory
    suffix: .cyclictest-{{ spoke_cluster }}
    path: /tmp
  register: artifacts_dir

- name: Display test configuration
  ansible.builtin.debug:
    msg:
      - "=========================================="
      - "Cyclictest Test Configuration"
      - "=========================================="
      - "Spoke Cluster: {{ spoke_cluster }}"
      - "Kubeconfig: {{ spoke_kubeconfig }}"
      - "Duration: {{ duration | default(telco_kpis_default_duration_cyclictest) }}"
      - "Artifacts: {{ artifacts_dir.path }}"
      - "=========================================="

- name: Ensure kubeconfig is readable by podman container
  ansible.builtin.file:
    path: "{{ spoke_kubeconfig }}"
    mode: '0644'

- name: Display monitoring instructions for real-time log viewing
  ansible.builtin.debug:
    msg:
      - "=========================================="
      - "To monitor test execution in real-time:"
      - "=========================================="
      - "SSH to bastion: ssh {{ ansible_user }}@{{ ansible_host }}"
      - "Tail the log:   tail -f {{ artifacts_dir.path }}/podman-run.log"
      - ""
      - "Or from local:"
      - "ssh {{ ansible_user }}@{{ ansible_host }} 'tail -f {{ artifacts_dir.path }}/podman-run.log'"
      - "=========================================="
      - "Container name: telco-kpis-cyclictest-{{ spoke_cluster }}"
      - "Podman logs:    podman logs -f telco-kpis-cyclictest-{{ spoke_cluster }}"
      - "=========================================="

- name: Template Cyclictest test script to bastion
  ansible.builtin.template:
    src: templates/run-cyclictest-test.sh.j2
    dest: "{{ artifacts_dir.path }}/run-cyclictest-test.sh"
    mode: '0755'

- name: Run Cyclictest test in podman container
  containers.podman.podman_container:
    name: telco-kpis-cyclictest-{{ spoke_cluster }}
    image: telco-kpis-test-runner:latest
    state: started
    detach: false
    rm: true
    command: /workspace/artifacts/run-cyclictest-test.sh
    volume:
      - "{{ spoke_kubeconfig }}:/tmp/kubeconfig-ro:ro,Z"
      - "{{ artifacts_dir.path }}:/workspace/artifacts:rw,Z"
  register: cyclictest_result
  failed_when: false
  changed_when: false

- name: Save container output to log file
  ansible.builtin.copy:
    content: "{{ cyclictest_result.stdout }}"
    dest: "{{ artifacts_dir.path }}/podman-run.log"
    mode: '0644'

- name: Extract container exit code
  ansible.builtin.set_fact:
    cyclictest_exit_code: "{{ cyclictest_result.container.State.ExitCode | default(0) }}"

- name: Display test execution result
  ansible.builtin.debug:
    msg:
      - "Test exit code: {{ cyclictest_exit_code }}"
      - "{{ 'Test PASSED' if cyclictest_exit_code | int == 0 else 'Test FAILED' }}"

- name: Manage test artifacts (collect, share, report)
  ansible.builtin.include_role:
    name: artifact-management
  vars:
    artifact_management_test_name: "cyclictest"
    artifact_management_spoke_cluster: "{{ spoke_cluster }}"
    artifact_management_temp_dir: "{{ artifacts_dir.path }}"
    artifact_management_test_rc: "{{ cyclictest_exit_code }}"
    artifact_management_test_duration: "{{ duration_seconds }}"
    artifact_management_junit_source_pattern: "cyclictest_report.xml"

- name: Cleanup artifacts directory on bastion
  ansible.builtin.file:
    path: "{{ artifacts_dir.path }}"
    state: absent

- name: Fail if test failed
  ansible.builtin.fail:
    msg: "Cyclictest failed with exit code {{ cyclictest_exit_code }}"
  when: cyclictest_exit_code | int != 0
