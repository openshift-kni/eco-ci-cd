---
# Run PTP (Precision Time Protocol) test
# Test: PTP validation
# Purpose: Validate PTP synchronization and offset metrics on spoke cluster
# Duration: Configurable via duration parameter (default: 10m)

- name: Set PTP test variables
  ansible.builtin.set_fact:
    test_name: "ptp"
    test_display_name: "PTP"
    test_description: |
      This script runs the PTP (Precision Time Protocol) test to validate PTP
      synchronization and offset metrics on the spoke cluster. It clones required
      repositories, sets up the test environment, executes the test, and
      captures results.
    test_default_duration: "{{ telco_kpis_default_duration_ptp }}"
    test_command: "bash scripts/test_ptp.sh ptp={{ duration | default(telco_kpis_default_duration_ptp) }}"
    test_params_display: " (duration={{ duration | default(telco_kpis_default_duration_ptp) }})"
    test_additional_repos: []
    test_junit_pattern: "*ptp*.xml,*report*.xml"
    ran_integration_repo: "{{ telco_kpis_ran_integration_repo | default('https://gitlab.cee.redhat.com/ran/ran-integration.git') }}"

- name: Execute PTP test
  ansible.builtin.import_tasks: run-test.yml
