---
# Run CPU Utilization test
# Test: CPU_UTIL
# Purpose: Measure CPU usage under load on isolated CPUs with PerformanceProfile
# Duration: Configurable via duration parameter (default: 10m)
# Baseline: Optional baseline mode for trend comparison (default: false)

- name: Set baseline suffix
  ansible.builtin.set_fact:
    baseline_suffix: "{{ '.baseline' if (baseline | default(false) | bool) else '' }}"

- name: Set CPU utilization test variables
  ansible.builtin.set_fact:
    test_name: "cpu_util"
    test_display_name: "CPU utilization"
    test_description: |
      This script runs the CPU utilization test to measure CPU usage under load
      on isolated CPUs configured with PerformanceProfile. It clones required
      repositories, sets up the test environment, executes the test, and
      captures results.
    test_default_duration: "{{ telco_kpis_default_duration_cpu_util }}"
    test_command: "bash scripts/test_cpu_util.sh cpu_util={{ duration | default(telco_kpis_default_duration_cpu_util) }}{{ baseline_suffix }}"
    test_params_display: " (duration={{ duration | default(telco_kpis_default_duration_cpu_util) }}{{ baseline_suffix }})"
    test_additional_repos:
      - name: cnf-gotests
        url: "{{ telco_kpis_cnf_gotests_repo | default('https://gitlab.cee.redhat.com/cnf/cnf-gotests.git') }}"
    test_junit_pattern: "*cpu*.xml,*report*.xml,*junit*.xml"
    test_artifact_name: "cpu-util"
    ran_integration_repo: "{{ telco_kpis_ran_integration_repo | default('https://gitlab.cee.redhat.com/ran/ran-integration.git') }}"

- name: Execute CPU utilization test
  ansible.builtin.import_tasks: run-test.yml
