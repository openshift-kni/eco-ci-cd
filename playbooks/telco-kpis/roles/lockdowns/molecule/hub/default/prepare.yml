                  "install_plan_approval": "Automatic",
                  "og_name": "open-cluster-management",
                  "og_spec": {
                    "targetNamespaces": ["open-cluster-management"]
                  }
                },
                {
                  "name": "topology-aware-lifecycle-manager",
                  "namespace": "openshift-operators",
