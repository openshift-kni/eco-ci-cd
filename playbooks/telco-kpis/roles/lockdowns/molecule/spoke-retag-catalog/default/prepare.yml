---
- name: Prepare retag test environment
  hosts: all
  gather_facts: false
  tasks:
    - name: Create test directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - /tmp/molecule-retag
        - /tmp/molecule-retag/bin

    - name: Create mock skopeo that logs its invocations
      ansible.builtin.copy:
        content: |
          #!/bin/bash
          echo "$@" >> /tmp/molecule-retag/skopeo-calls.log
          echo "Copying manifest list (mock)"
          exit 0
        dest: /tmp/molecule-retag/bin/skopeo
        mode: '0755'

    - name: Create mock authfile
      ansible.builtin.copy:
        content: '{"auths":{"disconnected.registry.local:5000":{"auth":"dGVzdDp0ZXN0"}}}'
        dest: /tmp/molecule-retag/auth.json
        mode: '0644'

    - name: Clear skopeo call log
      ansible.builtin.file:
        path: /tmp/molecule-retag/skopeo-calls.log
        state: absent
