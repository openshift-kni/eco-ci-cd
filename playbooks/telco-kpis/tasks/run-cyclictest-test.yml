---
# Run Cyclictest latency test
# Test: Cyclictest (Real-time latency measurement)
# Purpose: Measure RT kernel latency on isolated CPUs with PerformanceProfile
# Duration: Configurable via duration parameter (default: 12h)

- name: Set Cyclictest test variables
  ansible.builtin.set_fact:
    test_name: "cyclictest"
    test_display_name: "Cyclictest"
    test_description: |
      This script runs the Cyclictest to measure real-time kernel latency on
      isolated CPUs configured with PerformanceProfile. It clones required
      repositories, sets up the test environment, executes the test, and
      captures results.
    test_default_duration: "{{ telco_kpis_default_duration_cyclictest }}"
    test_command: "bash scripts/test_cyclictest.sh cyclictest={{ duration | default(telco_kpis_default_duration_cyclictest) }}"
    test_params_display: " (duration={{ duration | default(telco_kpis_default_duration_cyclictest) }})"
    test_additional_repos:
      - name: cyclictest
        url: "{{ telco_kpis_cyclictest_repo | default('https://gitlab.cee.redhat.com/ran/cyclictest.git') }}"
    test_junit_pattern: "cyclictest_report.xml"
    ran_integration_repo: "{{ telco_kpis_ran_integration_repo | default('https://gitlab.cee.redhat.com/ran/ran-integration.git') }}"

- name: Execute Cyclictest test
  ansible.builtin.import_tasks: run-test.yml
