tmp_workdir: "/tmp/wip/artifacts"
manifest_dir: "{{ tmp_workdir }}/manifests"
nrop_test_dir: "{{ tmp_workdir }}/tests"

dry_run: true
run_reboot_tests_only: false

test_env: prod
scope: "pod"

# Images
numa_mustgather_image: "registry.stage.redhat.io/openshift4/numaresources-must-gather-rhel9"
nrop_test_image_tag: "quay.io/openshift-kni/numaresources-operator-tests:latest"

# scheduler settings
scheduler_image_name: noderesourcetopology-scheduler
image_uri:
  prod: registry.redhat.io/openshift4
  stage: registry.stage.redhat.io/openshift4

# # devices
sample_device_type_1: example.com/deviceA
sample_device_type_2: example.com/deviceB
sample_device_type_3: example.com/deviceC

# Test to skip
ginkgo_skip: "84312|should converge with mixed SELinux policy across node groups"

# Test Conigurations
_ginkgo_label: 'tier0 || tier1'  # run only this labled tests
