---
# Validate that Gitea admin credentials are available from vault

- name: Display credential source
  ansible.builtin.debug:
    msg:
      - "=========================================="
      - "Gitea Admin Credentials"
      - "=========================================="
      - "Username: {{ gitea_admin_user }}"
      - "Password: {{ '*' * (gitea_admin_password | length) if gitea_admin_password else '[NOT SET]' }}"
      - "Email: {{ gitea_admin_email }}"
      - "Source: Vault (ansible_user/ansible_password)"
      - "=========================================="

- name: Validate admin username is set
  ansible.builtin.assert:
    that:
      - gitea_admin_user is defined
      - gitea_admin_user | length > 0
    fail_msg: "Gitea admin username not found. Ensure bastion vault provides 'ansible_user' variable."
    success_msg: "Gitea admin username: {{ gitea_admin_user }}"

- name: Validate admin password is set
  ansible.builtin.assert:
    that:
      - gitea_admin_password is defined
      - gitea_admin_password | length > 0
    fail_msg: |
      Gitea admin password not found in vault.

      Expected vault variable: 'ansible_password' from bastion vault.

      To fix:
      1. Ensure bastion vault (ansible_group_bastions or host_vars) contains 'ansible_password'
      2. OR set gitea_admin_password explicitly in extra vars
      3. OR set environment variable BASTION_PASSWORD
    success_msg: "Gitea admin password retrieved from vault"
