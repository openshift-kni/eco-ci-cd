              }
            ],
            "metadata": {
              "hub_name": "dev-kpi-01",
              "mirror_timestamp": "2026-06-17T12:24:06Z",
              "build_number": "66"
            }
          }
        dest: /tmp/molecule-tests/spoke-lockdown-legacy.json
        mode: '0644'

    - name: Create mock spoke lockdown JSON (new format - future compatible)
      ansible.builtin.copy:
        content: |
