---
- name: Prune ArgoCD apps and remove seed ManagedCluster
  hosts: bastion
  gather_facts: false
  vars:
    spoke_kubeconfig: "/tmp/{{ spoke_cluster }}-kubeconfig"
    openshift_gitops_namespace: "openshift-gitops"
    argocd_apps:
      - clusters
      - policies

  tasks:

    - name: Validate required variables
      ansible.builtin.assert:
        that:
          - spoke_cluster is defined and spoke_cluster | length > 0
          - hub_kubeconfig is defined and hub_kubeconfig | length > 0
        fail_msg: "spoke_cluster and hub_kubeconfig must be provided as extra-vars"

    - name: Get spoke cluster admin kubeconfig secret from hub
      kubernetes.core.k8s_info:
        kubeconfig: "{{ hub_kubeconfig }}"
        api_version: v1
        kind: Secret
        namespace: "{{ spoke_cluster }}"
        name: "{{ spoke_cluster }}-admin-kubeconfig"
      register: spoke_kubeconfig_secret

    - name: Extract spoke kubeconfig to specified path
      ansible.builtin.copy:
        content: "{{ spoke_kubeconfig_secret.resources[0].data.kubeconfig | b64decode }}"
        dest: "{{ spoke_kubeconfig }}"
        mode: '0600'

    - name: Remove finalizers from ArgoCD apps # noqa: ignore-errors
      kubernetes.core.k8s:
        state: patched
        api_version: argoproj.io/v1alpha1
        kind: Application
        name: "{{ item }}"
        namespace: "{{ openshift_gitops_namespace }}"
        kubeconfig: "{{ hub_kubeconfig }}"
        definition:
          metadata:
            finalizers: []
      loop: "{{ argocd_apps }}"
      ignore_errors: true

    - name: Delete ArgoCD apps
      kubernetes.core.k8s:
        state: absent
        api_version: argoproj.io/v1alpha1
        kind: Application
        name: "{{ item }}"
        namespace: "{{ openshift_gitops_namespace }}"
        kubeconfig: "{{ hub_kubeconfig }}"
      loop: "{{ argocd_apps }}"

    - name: Wait for ArgoCD apps to be deleted
      kubernetes.core.k8s_info:
        api_version: argoproj.io/v1alpha1
        kind: Application
        name: "{{ item }}"
        namespace: "{{ openshift_gitops_namespace }}"
        kubeconfig: "{{ hub_kubeconfig }}"
      register: argocd_apps_check
      until: argocd_apps_check.resources | length == 0
      retries: 12
      delay: 10
      loop: "{{ argocd_apps }}"

    - name: Get spoke pull secret from hub
      kubernetes.core.k8s_info:
        kubeconfig: "{{ hub_kubeconfig }}"
        api_version: v1
        kind: Secret
        namespace: "{{ spoke_cluster }}"
        name: "{{ spoke_cluster }}-pull-secret"
      register: spoke_pull_secret
      no_log: true

    - name: Sync full pull secret to spoke openshift-config
      kubernetes.core.k8s:
        kubeconfig: "{{ spoke_kubeconfig }}"
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: pull-secret
            namespace: openshift-config
          type: kubernetes.io/dockerconfigjson
          data:
            .dockerconfigjson: "{{ spoke_pull_secret.resources[0].data['.dockerconfigjson'] }}"
      when: spoke_pull_secret.resources | length > 0
      no_log: true

    - name: Get LocalVolume resources on spoke
      kubernetes.core.k8s_info:
        kubeconfig: "{{ spoke_kubeconfig }}"
        api_version: local.storage.openshift.io/v1
        kind: LocalVolume
        namespace: openshift-local-storage
      register: local_volumes

    - name: Delete LocalVolume resources on spoke
      kubernetes.core.k8s:
        kubeconfig: "{{ spoke_kubeconfig }}"
        state: absent
        api_version: local.storage.openshift.io/v1
        kind: LocalVolume
        name: "{{ item.metadata.name }}"
        namespace: openshift-local-storage
      loop: "{{ local_volumes.resources | default([]) }}"
      when: local_volumes.resources | length > 0

    - name: Remove finalizers from seed ManagedCluster # noqa: ignore-errors
      kubernetes.core.k8s:
        state: patched
        api_version: cluster.open-cluster-management.io/v1
        kind: ManagedCluster
        name: "{{ spoke_cluster }}"
        kubeconfig: "{{ hub_kubeconfig }}"
        definition:
          metadata:
            finalizers: []
      ignore_errors: true

    - name: Delete seed ManagedCluster
      kubernetes.core.k8s:
        state: absent
        api_version: cluster.open-cluster-management.io/v1
        kind: ManagedCluster
        name: "{{ spoke_cluster }}"
        kubeconfig: "{{ hub_kubeconfig }}"

    - name: Wait for seed ManagedCluster to be deleted
      kubernetes.core.k8s_info:
        api_version: cluster.open-cluster-management.io/v1
        kind: ManagedCluster
        name: "{{ spoke_cluster }}"
        kubeconfig: "{{ hub_kubeconfig }}"
      register: managedcluster_check
      until: managedcluster_check.resources | length == 0
      retries: 30
      delay: 10

    - name: Delete klusterlet from spoke to complete hub detachment # noqa: ignore-errors
      kubernetes.core.k8s:
        state: absent
        api_version: operator.open-cluster-management.io/v1
        kind: Klusterlet
        name: klusterlet
        kubeconfig: "{{ spoke_kubeconfig }}"
      ignore_errors: true

    - name: Wait for ACM agent namespaces to be removed from spoke
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Namespace
        kubeconfig: "{{ spoke_kubeconfig }}"
      register: spoke_namespaces
      until: >-
        spoke_namespaces.resources |
        selectattr('metadata.name', 'match', '^open-cluster-management') |
        list | length == 0
      retries: 30
      delay: 10
