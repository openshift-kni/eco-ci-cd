---
# Run Reboot test
# Test: REBOOT
# Purpose: Test cluster stability and recovery through multiple reboot cycles
# Reboot Count: Configurable via reboot_count parameter (default: 6)

- name: Set Reboot test variables
  ansible.builtin.set_fact:
    test_name: "reboot"
    test_display_name: "Reboot"
    test_description: |
      This script runs the Reboot test to validate cluster stability and recovery
      through multiple reboot cycles. It clones required repositories, sets up
      the test environment, executes the test, and captures results.
    test_default_reboot_count: "{{ telco_kpis_default_reboot_count }}"
    test_command: "bash scripts/test_reboot.sh reboot={{ reboot_count | default(telco_kpis_default_reboot_count) }}"
    test_params_display: " (reboot_count={{ reboot_count | default(telco_kpis_default_reboot_count) }})"
    test_additional_repos:
      - name: cnf-gotests
        url: >-
          {{ cnf_gotests_repo
             | default(telco_kpis_cnf_gotests_repo, true)
             | default('https://gitlab.cee.redhat.com/cnf/cnf-gotests.git') }}
    test_junit_pattern: "*reboot*.xml,*report*.xml,*junit*.xml"
    ran_integration_repo: >-
      {{ ran_integration_repo
         | default(telco_kpis_ran_integration_repo, true)
         | default('https://gitlab.cee.redhat.com/ran/ran-integration.git') }}

- name: Execute Reboot test
  ansible.builtin.import_tasks: run-test.yml
