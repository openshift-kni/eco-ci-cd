---
# Ansible Playbook: Collect RAN Metrics
# -------------------------------------------------
# This playbook collects operator versions and cluster metadata from hub and
# spoke OpenShift clusters, then writes a semicolon-delimited metrics string
# to a file for use by the upload-report playbook.
# It uses the collect_metrics role to gather all RAN-relevant metrics.

# Requirements:
# - Bastion host with access to the hub and spoke clusters
# - Valid kubeconfig files for hub and spoke clusters

# Usage:
# ansible-playbook ./playbooks/ran/collect-metrics.yml \
#   -i ./inventories/ocp-deployment/build-inventory.py \
#   --extra-vars '{
#     "ran_hub_kubeconfig": "/path/to/hub/kubeconfig",
#     "ran_spoke_kubeconfig": "/path/to/spoke/kubeconfig",
#     "ran_ci_lane": "my-lane",
#     "ran_output_file": "/tmp/metrics/ran-metrics.txt",
#     "ran_metrics_list": "spoke_general_ocp,hub_general_ocp,sriov,acm"
#   }'

# Vars needed:
# ran_spoke_kubeconfig  Path to the spoke cluster kubeconfig file. Example: /home/user/.kube/spoke-kubeconfig
# ran_hub_kubeconfig    Path to the hub cluster kubeconfig file. Example: /home/user/.kube/hub-kubeconfig
# ran_ci_lane           CI lane identifier for the test run. Example: ran-4.17
# ran_output_file       Path to the output file. Example: /tmp/metrics/ran-metrics.txt
# ran_metrics_list      Comma-separated list of metrics to collect. Example: spoke_general_ocp,acm,gitops

- name: Collect metrics for report portal
  hosts: bastion
  gather_facts: false
  pre_tasks:
    - name: Validate RAN required variables
      ansible.builtin.assert:
        that:
          - ran_spoke_kubeconfig is defined
          - ran_hub_kubeconfig is defined
          - ran_ci_lane is defined
          - ran_output_file is defined
          - ran_metrics_list is defined
        fail_msg: >-
          ran_spoke_kubeconfig, ran_hub_kubeconfig, ran_ci_lane,
          ran_output_file and ran_metrics_list must be provided via --extra-vars
  roles:
    - role: collect_metrics
      collect_metrics_spoke_kubeconfig: "{{ ran_spoke_kubeconfig }}"
      collect_metrics_hub_kubeconfig: "{{ ran_hub_kubeconfig }}"
      collect_metrics_ci_lane: "{{ ran_ci_lane }}"
      collect_metrics_output_file: "{{ ran_output_file }}"
      collect_metrics_list: "{{ ran_metrics_list.split(',') }}"

