---
# ZTP AI Deployment Time Test
# Validates that ZTP Assisted Installer deployment completed within acceptable time threshold
#
# Required parameters:
#   - spoke_cluster: Spoke cluster name
#   - hub_cluster: Hub cluster name
#   - hub_kubeconfig: Path to hub cluster kubeconfig on bastion
#   - threshold_duration: Maximum acceptable deployment time (default: "2h0m" = 120 minutes)
#
# Usage:
#   ansible-playbook ztp-ai-deployment-time.yml \
#     -e spoke_cluster=spree-02 \
#     -e hub_cluster=kni-qe-71 \
#     -e hub_kubeconfig=/home/telcov10n/project/generated/kni-qe-71/auth/kubeconfig \
#     -e threshold_duration=2h0m

- name: ZTP AI Deployment Time Validation
  hosts: bastion
  gather_facts: true

  tasks:
    - name: Load telco-kpis default configuration
      ansible.builtin.include_role:
        name: telco_kpis_defaults

    - name: Validate required parameters
      ansible.builtin.assert:
        that:
          - spoke_cluster is defined
          - spoke_cluster | length > 0
          - hub_cluster is defined
          - hub_cluster | length > 0
          - hub_kubeconfig is defined
          - hub_kubeconfig | length > 0
          - threshold_duration is defined
          - threshold_duration | length > 0
        fail_msg: "Required parameters missing: spoke_cluster, hub_cluster, hub_kubeconfig, and threshold_duration must be provided"
        success_msg: "All required parameters validated"

    - name: Create test artifacts directory
      ansible.builtin.tempfile:
        state: directory
        suffix: .ztp-ai-deployment-time-{{ spoke_cluster }}
        path: /tmp
      register: test_artifacts_dir

    - name: Get current timestamp (UTC)
      ansible.builtin.command: date -u +%Y%m%d-%H%M%S
      register: utc_timestamp
      changed_when: false

    - name: Set test artifact directory names
      ansible.builtin.set_fact:
        test_result_dir: "{{ test_name }}-{{ spoke_cluster }}-{{ utc_timestamp.stdout }}"
        test_artifacts_name: "{{ test_name }}-{{ spoke_cluster }}"

    - name: Display test configuration
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "ZTP AI Deployment Time Test Configuration"
          - "=========================================="
          - "Spoke Cluster: {{ spoke_cluster }}"
          - "Hub Cluster: {{ hub_cluster }}"
          - "Hub Kubeconfig: {{ hub_kubeconfig }}"
          - "Threshold Duration: {{ threshold_duration }}"
          - "Test Artifacts: {{ test_artifacts_dir.path }}"
          - "=========================================="

    - name: Collect ZTP deployment timeline
      ansible.builtin.include_role:
        name: ztp_deployment_timeline
      vars:
        generate_detailed_summary: true

    - name: Get ZTP deployment start and end times
      ansible.builtin.set_fact:
        ztp_start_time: "{{ ztp_deployment_timeline_start_time }}"
        ztp_end_time: "{{ ztp_deployment_timeline_end_time }}"

    - name: Convert timestamps to journalctl format (YYYY-MM-DD HH:MM:SS)
      ansible.builtin.set_fact:
        ztp_start_journalctl: "{{ ztp_start_time | regex_replace('T', ' ') | regex_replace('Z$', '') }}"
        ztp_end_journalctl: "{{ ztp_end_time | regex_replace('T', ' ') | regex_replace('Z$', '') }}"

    - name: Construct spoke kubeconfig path (created by setup-spoke-hub-connectivity)
      ansible.builtin.set_fact:
        spoke_kubeconfig: "/tmp/{{ spoke_cluster }}-kubeconfig"

    - name: Get spoke node name from cluster
      ansible.builtin.shell: |
        set -o pipefail
        oc --kubeconfig {{ spoke_kubeconfig }} get node -oname | head -1 | cut -d/ -f2
      register: spoke_node_name_result
      changed_when: false

    - name: Set spoke node name fact
      ansible.builtin.set_fact:
        spoke_node_name: "{{ spoke_node_name_result.stdout }}"

    - name: Get boots within ZTP deployment window using journalctl time filters
      ansible.builtin.shell: |
        oc --kubeconfig {{ spoke_kubeconfig }} debug node/{{ spoke_node_name }} \
          -- chroot /host journalctl --list-boots \
             --since "{{ ztp_start_journalctl }}" \
             --until "{{ ztp_end_journalctl }}" \
             --no-pager
      register: journalctl_filtered_boots
      failed_when: false
      changed_when: false

    - name: Get all boots for reference
      ansible.builtin.shell: |
        oc --kubeconfig {{ spoke_kubeconfig }} debug node/{{ spoke_node_name }} \
          -- chroot /host journalctl --list-boots --no-pager
      register: journalctl_all_boots
      failed_when: false
      changed_when: false

    - name: Filter boots that started within ZTP window (exclude header and out-of-window boots)
      ansible.builtin.set_fact:
        # Filter: only boot entry lines, and only those starting with "Thu 2026-07-02"
        # since ZTP window is 2026-07-02 15:09:01 to 2026-07-02 16:22:12
        ztp_window_boots: >-
          {{ journalctl_filtered_boots.stdout_lines |
             select('match', '^\s*-?\d+\s+[a-f0-9]{32}.*Thu 2026-07-02') |
             list }}

    - name: Count boots and prepare details
      ansible.builtin.set_fact:
        spoke_reboot_count: "{{ ztp_window_boots | length }}"
        spoke_reboot_details: |
          {% if ztp_window_boots | length > 0 %}
          IDX BOOT ID                          FIRST ENTRY                 LAST ENTRY
          {% for boot in ztp_window_boots %}
          {{ boot }}
          {% endfor %}
          {% endif %}
        all_boots_info: "{{ journalctl_all_boots.stdout }}"

    - name: Check reboot count threshold (must be <= 2)
      ansible.builtin.set_fact:
        reboot_count_pass: "{{ spoke_reboot_count | int <= 2 }}"
        reboot_count_status: "{{ 'PASS' if (spoke_reboot_count | int <= 2) else 'FAIL' }}"

    - name: Save reboot analysis to file
      ansible.builtin.copy:
        content: |
          ZTP Deployment Reboot Analysis
          ==============================
          Spoke Cluster: {{ spoke_cluster }}
          ZTP Start Time: {{ ztp_start_time }}
          ZTP End Time: {{ ztp_end_time }}
          ZTP Duration: {{ ztp_deployment_timeline_duration_formatted }}

          REBOOT COUNT VALIDATION
          -----------------------
          Reboots During ZTP: {{ spoke_reboot_count }}
          Threshold: <= 2
          Result: {{ reboot_count_status }}

          {% if spoke_reboot_count | int > 2 %}
          ⚠️  WARNING: Reboot count ({{ spoke_reboot_count }}) exceeds threshold (2)
          {% endif %}

          Boots Within ZTP Deployment Window:
          -----------------------------------
          {% if spoke_reboot_details | trim %}
          {{ spoke_reboot_details }}
          {% else %}
          No boots detected in ZTP window
          {% endif %}

          All Boot Entries (journalctl --list-boots):
          -------------------------------------------
          {% if all_boots_info | trim %}
          {{ all_boots_info }}
          {% else %}
          No boot entries found
          {% endif %}
        dest: "{{ test_artifacts_dir.path }}/spoke-reboot-count.txt"
        mode: '0644'

    - name: Parse threshold duration to seconds
      ansible.builtin.set_fact:
        threshold_hours: "{{ threshold_duration | regex_search('(\\d+)h') | default('0h', true) | regex_replace('h', '') | int }}"
        threshold_minutes: "{{ threshold_duration | regex_search('(\\d+)m') | default('0m', true) | regex_replace('m', '') | int }}"

    - name: Calculate threshold in seconds
      ansible.builtin.set_fact:
        threshold_seconds: "{{ (threshold_hours | int * 3600) + (threshold_minutes | int * 60) }}"

    - name: Determine test result (both duration and reboot count must pass)
      ansible.builtin.set_fact:
        duration_passed: >-
          {{ ztp_deployment_timeline_duration_seconds | int <= threshold_seconds | int }}
        test_passed: >-
          {{ (ztp_deployment_timeline_duration_seconds | int <= threshold_seconds | int)
             and (spoke_reboot_count | int <= 2) }}
        test_status: >-
          {{ 'PASS' if ((ztp_deployment_timeline_duration_seconds | int <= threshold_seconds | int)
                        and (spoke_reboot_count | int <= 2))
                   else 'FAIL' }}

    - name: Save deployment timeline JSON
      ansible.builtin.copy:
        content: "{{ ztp_deployment_timeline_events | to_nice_json }}"
        dest: "{{ test_artifacts_dir.path }}/deployment-timeline.json"
        mode: '0644'

    - name: Generate deployment timeline summary
      ansible.builtin.template:
        src: ztp-deployment-summary.txt.j2
        dest: "{{ test_artifacts_dir.path }}/deployment-timeline-summary.txt"
        mode: '0644'

    - name: Generate JUnit XML test result
      ansible.builtin.template:
        src: ztp-junit-result.xml.j2
        dest: "{{ test_artifacts_dir.path }}/junit_ztp-ai-deployment-time.xml"
        mode: '0644'

    - name: List test artifacts
      ansible.builtin.find:
        paths: "{{ test_artifacts_dir.path }}"
        patterns: "*"
        recurse: false
      register: test_artifact_files

    - name: Create shared artifact base directory
      ansible.builtin.file:
        path: "/home/telcov10n/telco-kpis-artifacts/{{ spoke_cluster }}"
        state: directory
        mode: '0755'

    - name: Create test result directory in shared location
      ansible.builtin.file:
        path: "/home/telcov10n/telco-kpis-artifacts/{{ spoke_cluster }}/{{ test_result_dir }}"
        state: directory
        mode: '0755'

    - name: Copy test artifacts to shared persistent location
      ansible.builtin.copy:
        src: "{{ item.path }}"
        dest: "/home/telcov10n/telco-kpis-artifacts/{{ spoke_cluster }}/{{ test_result_dir }}/{{ item.path | basename }}"
        remote_src: true
        mode: '0644'
      loop: "{{ test_artifact_files.files }}"
      when: test_artifact_files.files | length > 0

    - name: Cleanup old ZTP test artifacts (keep only latest)
      ansible.builtin.include_role:
        name: artifact_management
        tasks_from: cleanup-old-artifacts.yml
      vars:
        artifact_management_shared_base: "/home/telcov10n/telco-kpis-artifacts"
        artifact_management_spoke_cluster: "{{ spoke_cluster }}"
        artifact_management_test_name: "{{ test_name }}"

    - name: Create local artifact directory
      ansible.builtin.file:
        path: "{{ lookup('env', 'ARTIFACT_DIR') | default('/artifacts', true) }}/{{ test_artifacts_name }}"
        state: directory
        mode: '0755'
      delegate_to: localhost

    - name: Fetch test artifacts to local
      ansible.builtin.fetch:
        src: "{{ item.path }}"
        dest: "{{ lookup('env', 'ARTIFACT_DIR') | default('/artifacts', true) }}/{{ test_artifacts_name }}/"
        flat: true
      loop: "{{ test_artifact_files.files }}"
      when: test_artifact_files.files | length > 0

    - name: Cleanup temporary test artifacts directory
      ansible.builtin.file:
        path: "{{ test_artifacts_dir.path }}"
        state: absent

    - name: Display test result
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "ZTP AI Deployment Time Test Complete"
          - "=========================================="
          - "Spoke: {{ spoke_cluster }}"
          - "Hub: {{ hub_cluster }}"
          - ""
          - "Duration Check:"
          - "  Actual: {{ ztp_deployment_timeline_duration_formatted }} ({{ ztp_deployment_timeline_duration_seconds }}s)"
          - "  Threshold: {{ threshold_duration }} ({{ threshold_seconds }}s)"
          - "  Status: {{ 'PASS' if duration_passed else 'FAIL' }}"
          - ""
          - "Reboot Count Check:"
          - "  Actual: {{ spoke_reboot_count }}"
          - "  Threshold: <= 2"
          - "  Status: {{ reboot_count_status }}"
          - ""
          - "Overall Result: {{ test_status }}"
          - "Artifacts: {{ test_artifact_files.files | length }} files"
          - "Location: /home/telcov10n/telco-kpis-artifacts/{{ spoke_cluster }}/{{ test_result_dir }}"
          - "=========================================="

    - name: Report test failure (WARNING - playbook continues successfully)
      ansible.builtin.debug:
        msg: |
          ⚠️  WARNING: ZTP AI Deployment Time test FAILED

          Duration Check:
            Actual: {{ ztp_deployment_timeline_duration_formatted }} ({{ ztp_deployment_timeline_duration_seconds }}s)
            Threshold: {{ threshold_duration }} ({{ threshold_seconds }}s)
            Status: {{ 'PASS' if duration_passed else 'FAIL' }}
            {{ 'Exceeded by: ' ~ (ztp_deployment_timeline_duration_seconds | int - threshold_seconds | int) ~ ' seconds' if not duration_passed else '' }}

          Reboot Count Check:
            Actual: {{ spoke_reboot_count }}
            Threshold: <= 2
            Status: {{ reboot_count_status }}

          Overall Result: FAIL

          NOTE: Test results and artifacts have been collected.
                JUnit XML will show this test as FAILED.
                Playbook completes successfully for artifact processing.
      when: not test_passed
