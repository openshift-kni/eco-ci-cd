---
# Run CPU Utilization test
# Test: CPU_UTIL
# Purpose: Measure CPU usage under load on isolated CPUs with PerformanceProfile
# Duration: Configurable via duration parameter (default: 10m)
# Baseline: Optional baseline mode for trend comparison (default: false)

- name: Ensure test-runner container image exists on bastion
  ansible.builtin.import_tasks: setup-test-runner.yml

- name: Create artifacts directory on bastion
  ansible.builtin.tempfile:
    state: directory
    suffix: .cpu_util-{{ spoke_cluster }}
    path: /tmp
  register: artifacts_dir

- name: Set baseline suffix
  ansible.builtin.set_fact:
    baseline_suffix: "{{ '.baseline' if (baseline | default(false) | bool) else '' }}"

- name: Display test configuration
  ansible.builtin.debug:
    msg:
      - "=========================================="
      - "CPU Utilization Test Configuration"
      - "=========================================="
      - "Spoke Cluster: {{ spoke_cluster }}"
      - "Kubeconfig: {{ spoke_kubeconfig }}"
      - "Duration: {{ duration | default(telco_kpis_default_duration_cpu_util) }}"
      - "Baseline Mode: {{ 'ENABLED' if (baseline | default(false) | bool) else 'DISABLED' }}"
      - "Test Type: cpu_util={{ duration | default(telco_kpis_default_duration_cpu_util) }}{{ baseline_suffix }}"
      - "Artifacts: {{ artifacts_dir.path }}"
      - "=========================================="

- name: Ensure kubeconfig is readable by podman container
  ansible.builtin.file:
    path: "{{ spoke_kubeconfig }}"
    mode: '0644'

- name: Display monitoring instructions for real-time log viewing
  ansible.builtin.debug:
    msg:
      - "=========================================="
      - "To monitor test execution in real-time:"
      - "=========================================="
      - "SSH to bastion: ssh {{ ansible_user }}@{{ ansible_host }}"
      - "Tail the log:   tail -f {{ artifacts_dir.path }}/podman-run.log"
      - ""
      - "Or from local:"
      - "ssh {{ ansible_user }}@{{ ansible_host }} 'tail -f {{ artifacts_dir.path }}/podman-run.log'"
      - "=========================================="
      - "Container name: telco-kpis-cpu_util-{{ spoke_cluster }}"
      - "Podman logs:    podman logs -f telco-kpis-cpu_util-{{ spoke_cluster }}"
      - "=========================================="

- name: Run CPU utilization test in podman container
  ansible.builtin.shell: |
    set -o pipefail
    podman run --rm \
      --name telco-kpis-cpu_util-{{ spoke_cluster }} \
      -v {{ spoke_kubeconfig }}:/tmp/kubeconfig-ro:ro,Z \
      -v {{ artifacts_dir.path }}:/workspace/artifacts:rw,Z \
      telco-kpis-test-runner:latest \
      bash -c '
        set -e
        cp /tmp/kubeconfig-ro /tmp/kubeconfig
        export KUBECONFIG=/tmp/kubeconfig
        export GIT_SSL_NO_VERIFY=true
        export RAN_METRICS_URL=https://pushgateway.ran-metrics.telco5g.corp.redhat.com/metrics/job/pipeline1/

        echo "Cloning ran-integration repository..."
        git clone --depth 1 {{ telco_kpis_ran_integration_repo | default('https://gitlab.cee.redhat.com/ran/ran-integration.git') }} /workspace/ran-integration
        cd /workspace/ran-integration

        echo "Cloning cnf-gotests repository..."
        git clone --depth 1 {{ telco_kpis_cnf_gotests_repo | default('https://gitlab.cee.redhat.com/cnf/cnf-gotests.git') }} cnf-gotests

        export WORKSPACE=/workspace/ran-integration
        export SCRIPTS_DIR=/workspace/ran-integration/scripts

        echo "Creating artifacts symlink..."
        ln -sfn /workspace/artifacts /workspace/ran-integration/artifacts

        echo "Starting CPU utilization test (duration={{ duration | default(telco_kpis_default_duration_cpu_util) }}{{ baseline_suffix }})..."
        set +e
        bash scripts/test_cpu_util.sh cpu_util={{ duration | default(telco_kpis_default_duration_cpu_util) }}{{ baseline_suffix }}
        exit_code=$?

        echo "CPU utilization test completed with exit code: $exit_code"
        exit $exit_code
      ' 2>&1 | tee {{ artifacts_dir.path }}/podman-run.log
  register: cpu_util_result
  failed_when: false
  args:
    executable: /bin/bash

- name: Display test execution result
  ansible.builtin.debug:
    msg:
      - "Test exit code: {{ cpu_util_result.rc }}"
      - "{{ 'Test PASSED' if cpu_util_result.rc == 0 else 'Test FAILED' }}"
      - "Baseline mode: {{ 'ENABLED' if (baseline | default(false) | bool) else 'DISABLED' }}"

- name: Manage test artifacts (collect, share, report)
  ansible.builtin.include_role:
    name: artifact-management
  vars:
    artifact_management_test_name: "cpu-util"
    artifact_management_spoke_cluster: "{{ spoke_cluster }}"
    artifact_management_temp_dir: "{{ artifacts_dir.path }}"
    artifact_management_test_rc: "{{ cpu_util_result.rc }}"
    artifact_management_test_duration: "{{ duration_seconds }}"
    artifact_management_junit_source_pattern: "*cpu*.xml,*report*.xml,*junit*.xml"

- name: Cleanup artifacts directory on bastion
  ansible.builtin.file:
    path: "{{ artifacts_dir.path }}"
    state: absent

- name: Fail if test failed
  ansible.builtin.fail:
    msg: "CPU utilization test failed with exit code {{ cpu_util_result.rc }}"
  when: cpu_util_result.rc != 0
